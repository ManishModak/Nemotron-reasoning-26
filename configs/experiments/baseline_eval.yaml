{
  "run_name": "baseline_eval",
  "data": {
    "train_path": "train.csv",
    "test_path": "test.csv",
    "auto_discover": true,
    "validation_ratio": 0.5,
    "seed": 13,
    "eval_limit": null
  },
  "routing": {
    "enabled": true,
    "confidence_threshold": 0.95,
    "enabled_families": [
      "roman_numeral",
      "gravity_distance",
      "unit_conversion"
    ]
  },
  "prompts": [
    "baseline_direct",
    "reasoned_boxed",
    "self_check_boxed"
  ],
  "selected_prompt_variant": "reasoned_boxed",
  "reporting": {
    "output_dir": "artifacts/runs/baseline_eval",
    "failure_sample_size": 5
  },
  "kaggle": {
    "output_dir": "artifacts/runs/kaggle_handoff",
    "sample_limit": 3
  },
  "predictor": {
    "type": "heuristic",
    "model_handle": "metric/nemotron-3-nano-30b-a3b-bf16/transformers/default",
    "max_new_tokens": 128,
    "batch_size": 1,
    "temperature": 0.0,
    "do_sample": false,
    "trust_remote_code": true,
    "torch_dtype": "bfloat16",
    "device_map": "auto"
  },
  "submission": {
    "output_csv": "submission.csv"
  }
}
